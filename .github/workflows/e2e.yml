# Day 11+: CI E2E multi-job — master push 强制, PR fail-soft
#   WHY: 单 job 跑完 2+ 小时, 反馈太慢. 拆为 setup + e2e + frontend-contract 3 个并行 job
#   设计:
#     - master push: 3 job 全过才允许合并 (gate)
#     - PR: 失败不阻塞 (fail-soft)
#     - PostgreSQL service container (离线, 无外部依赖)
#     - setup job: dotnet build + nuget cache restore (其他 job 共享)
#     - e2e job: P4.1 9 编排 + 9.5/9.6/9.7/9.8 + Day10 + benchmark
#     - frontend-contract job: P4.2 vitest + zod + P4.3 visual smoke
name: E2E Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  ADMIN_TOKEN: 'dev-admin-token-rotate-in-prod-MZK4R9P3X6V2N7Q1L5F0B8H3C'
  PG_PASSWORD: '784533'
  BACKEND_URL: 'http://localhost:5148'

jobs:
  # ===== 共享 build job =====
  # WHY: e2e + frontend-contract 都需 dotnet build output, 用 cache + setup 共享减少 1-2 分钟构建时间
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Build backend
        run: |
          cd backend/src/SakuraFilter.Api
          dotnet build -c Release --nologo
      - name: Upload build output (for other jobs to skip rebuild)
        # WHY: dotnet run --no-build 需要 obj/ 目录 (含 source 时间戳和 ref assembly),
        #      之前只传 bin/ → dotnet run 启动 fork+exec 时找不到 .cache 文件 → Win32Exception 13 (EACCES)
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            backend/src/SakuraFilter.Api/bin
            backend/src/SakuraFilter.Api/obj
          retention-days: 1
          if-no-files-found: warn

  # ===== E2E 主 job: P4.1 9 编排 + ETL 跨实例 + benchmark =====
  e2e:
    needs: setup
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 784533
          POSTGRES_DB: spike_test_v3
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Python deps
        run: pip install psycopg2-binary
      - name: Download prebuilt backend
        # WHY: path 去掉 /bin 后缀
        #   setup job upload 路径是 backend/src/SakuraFilter.Api/bin
        #   → zip 顶层目录 = backend/src/SakuraFilter.Api/bin/
        #   → download 到 path: backend/src/SakuraFilter.Api
        #   → 解压后产物 = backend/src/SakuraFilter.Api/bin/Release/net8.0/SakuraFilter.Api ✅
        #   之前 path: backend/src/SakuraFilter.Api/bin
        #   → 解压后 = backend/src/SakuraFilter.Api/bin/backend/src/SakuraFilter.Api/bin/... ❌ 路径重复
        #   → dotnet run --no-build 找不到 SakuraFilter.Api → Win32Exception 2 (No such file or directory)
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend/src/SakuraFilter.Api
      - name: chmod API binary
        # WHY: download-artifact 解压的文件默认 0644, Linux 容器内 +x 位未设置
        #   → dotnet run --no-build fork+exec 触发 Win32Exception 13 (EACCES)
        #   修复: 给 SakuraFilter.Api 主程序加可执行位
        run: chmod +x backend/src/SakuraFilter.Api/bin/Release/net8.0/SakuraFilter.Api

      # 启动 API server (120s 超时, 失败时输出日志诊断)
      - name: Run API server (background)
        id: api-server
        run: |
          cd backend/src/SakuraFilter.Api
          dotnet run -c Release --no-build --urls "http://localhost:5148" > /tmp/api5148.log 2>&1 &
          API_PID=$!
          echo "API PID: $API_PID"
          A_READY=0
          for i in $(seq 1 120); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5148/api/etl/status -H "X-Admin-Token: $ADMIN_TOKEN" 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then
              echo "API 5148 ready after ${i}s"
              A_READY=1
              break
            fi
            sleep 1
          done
          if [ "$A_READY" != "1" ]; then
            echo "::error::API 5148 在 120s 内未就绪 (PID=$API_PID 仍存活=$(kill -0 $API_PID 2>/dev/null && echo yes || echo no))"
            echo "::error::=== API 日志最后 30 行 ==="
            tail -n 30 /tmp/api5148.log | sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' | while IFS= read -r line; do
              echo "::error file=/tmp/api5148.log::$line"
            done
            exit 1
          fi

      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-server-log
          path: /tmp/api5148.log
          if-no-files-found: ignore

      # Day 9.5/9.6/9.7/9.8 跨实例 ETL 测试
      - name: Run E2E Day 9.5 (cancel enum + alert filter + cursor HMAC)
        working-directory: spike-test
        run: python _test_day95.py

      - name: Run E2E Day 9.6 (radio UI + CI gate + HMAC rotation + SSE broadcast)
        working-directory: spike-test
        run: python _test_day96.py

      - name: Run E2E Day 9.7 (cross-instance SSE NOTIFY/LISTEN)
        working-directory: spike-test
        run: |
          # Day 9.7 需要双实例, CI 内启动第二个 (5149)
          cd ../backend/src/SakuraFilter.Api
          dotnet run -c Release --no-build --urls "http://localhost:5149" > /tmp/api5149.log 2>&1 &
          cd ../../../spike-test
          B_READY=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5149/api/etl/status -H "X-Admin-Token: $ADMIN_TOKEN" 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then
              echo "Instance B ready after ${i}s"
              B_READY=1
              break
            fi
            sleep 1
          done
          if [ "$B_READY" != "1" ]; then
            echo "::error::Instance B (5149) 30s 内未就绪"
            tail -n 80 /tmp/api5149.log
            exit 1
          fi
          if ! python _test_day97.py; then
            RC=$?
            echo "::error::Day 9.7 FAIL (rc=$RC)"
            echo "--- PG LISTEN etl_progress 进程数 ---"
            python -c "
          import psycopg2
          c = psycopg2.connect(host='localhost', port=5432, dbname='spike_test_v3', user='postgres', password='784533')
          cur = c.cursor()
          cur.execute(\"SELECT pid, query FROM pg_stat_activity WHERE query ILIKE '%LISTEN etl_progress%'\")
          for r in cur.fetchall():
              print(f'  pid={r[0]} query={r[1][:80]}')
          c.close()
          "
            tail -n 50 /tmp/api5149.log
            exit $RC
          fi

      - name: Run E2E Day 9.8 (ETL history audit + reason_code pie chart)
        working-directory: spike-test
        run: python _test_day98.py

      - name: Run E2E Day 10 (OEM Brand 字典 CRUD + 排序 + typeahead)
        working-directory: spike-test
        run: python _test_day10_oem_brands.py

      # 搜索性能基准 (P95 阈值 CI 放宽到 3000ms)
      - name: Run Search Benchmark (P1.4)
        working-directory: spike-test
        env:
          BENCH_THRESHOLD_P95: '3000'
          BENCH_THRESHOLD_TYPEAHEAD_P95: '200'
        run: python _bench_search.py --concurrency=10 --threshold-p95=$BENCH_THRESHOLD_P95 --threshold-typeahead-p95=$BENCH_THRESHOLD_TYPEAHEAD_P95

      # Day 11+ P4.1: 9 个 E2E 串行 + P5.5/P7.1 防回归
      - name: Run E2E P4.1 orchestrator (9 tests + P5.5/P7.1)
        working-directory: spike-test
        env:
          ADMIN_TOKEN: ${{ env.ADMIN_TOKEN }}
        run: |
          echo "===== P4.1 E2E 编排器: 9 个测试 + P5.5/P7.1 串行跑 ====="
          for suite in _test_escape_underscore.py _test_day10_oem_brands.py _test_p22_seven_dicts.py _test_type_ordering.py _test_batch_oem.py _test_public_product.py _test_public_search.py _test_compare.py _test_p5_polish.py _test_p55_p71_e2e.py; do
            if [ -f "$suite" ]; then
              echo "================ Running $suite ================"
              if python "$suite"; then
                echo "[PASS] $suite"
              else
                RC=$?
                echo "::error::P4.1 FAIL: $suite (rc=$RC)"
                tail -n 50 /tmp/api5148.log 2>/dev/null || echo "无日志"
                exit $RC
              fi
            else
              echo "[SKIP] $suite (文件不存在)"
            fi
          done
          echo "===== P4.1 + P5.5/P7.1 E2E 10/10 PASS ====="

      # P0 改-1: P0 防回归 (BaseDictService 默认 limit + ProblemDetails 不泄露 + 无硬编码密码)
      #   WHY: P0 修复后需 CI 防回归, 避免 dict_oem_no3 OOM/ex.Message 泄露/硬编码密码再次引入
      - name: Run P0 fixes regression (防 OOM + 异常泄露 + 硬编码密码)
        working-directory: spike-test
        env:
          ADMIN_TOKEN: ${{ env.ADMIN_TOKEN }}
        run: |
          echo "===== P0 修复防回归 ====="
          if python _test_p0_fixes.py; then
            echo "[PASS] P0 修复防回归 3/3 全绿"
          else
            RC=$?
            echo "::error::P0 防回归 FAIL (rc=$RC)"
            exit $RC
          fi

      # P0 改-2: 安全门禁 — 扫描 .cs 文件中硬编码凭据 (替代 detect-secrets, 避免新依赖)
      #   WHY: P0-3 修复后需自动防护, 防止 Password=xxx 再次引入
      - name: Security gate (hardcoded credentials scan)
        run: |
          echo "===== 安全门禁: 扫描硬编码凭据 ====="
          # 扫描 .cs 文件中的硬编码密码模式 (Password=xxx / pwd=xxx, 排除 appsettings.json 配置源)
          HITS=$(grep -rE '(Password|password|pwd)=[^"[:space:]]+' backend/src --include="*.cs" | grep -v 'throw new' | grep -v 'GetConnectionString' || true)
          if [ -n "$HITS" ]; then
            echo "::error::发现硬编码凭据 (.cs 文件):"
            echo "$HITS" | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 1
          fi
          echo "[PASS] .cs 文件中无硬编码凭据"

      # P3 改-4: P1/P2/P3 防回归 (grep 验证 15 个修复模式)
      #   WHY: P0 用 API 验证, P1/P2/P3 多为代码层修复 (无 API 表面), 用 grep 模式验证
      #   覆盖: P1-1/2/3/4/5/6 + P2-1/2/3/4/5/7 + P3-1/2 = 15 个修复点
      - name: Run P1/P2/P3 regression (15 fixes pattern scan)
        working-directory: spike-test
        run: |
          echo "===== P1/P2/P3 修复防回归 (15 修复模式) ====="
          if python _test_regression.py --scan; then
            echo "[PASS] P1/P2/P3 修复防回归 15/15 全绿"
          else
            RC=$?
            echo "::error::P1/P2/P3 防回归 FAIL (rc=$RC), 存在修复模式回归"
            exit $RC
          fi

      - name: E2E gate check (master only)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          echo "E2E gate passed — all tests green on master push"

  # ===== Frontend Contract job: P4.2 vitest + zod + P4.3 visual smoke =====
  #   WHY: P4.2/P4.3 不需要 P4.1 9 测试, 独立并行跑 → 反馈更快 (Vitest 比 Python 9 测试快 5 倍)
  #   需要 API server 才能跑 (调后端 _schema 端点), 每个 job 独立起 5148
  frontend-contract:
    needs: setup
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 784533
          POSTGRES_DB: spike_test_v3
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Python deps
        run: pip install psycopg2-binary
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Download prebuilt backend
        # WHY: path 去掉 /bin 后缀
        #   setup job upload 路径是 backend/src/SakuraFilter.Api/bin
        #   → zip 顶层目录 = backend/src/SakuraFilter.Api/bin/
        #   → download 到 path: backend/src/SakuraFilter.Api
        #   → 解压后产物 = backend/src/SakuraFilter.Api/bin/Release/net8.0/SakuraFilter.Api ✅
        #   之前 path: backend/src/SakuraFilter.Api/bin
        #   → 解压后 = backend/src/SakuraFilter.Api/bin/backend/src/SakuraFilter.Api/bin/... ❌ 路径重复
        #   → dotnet run --no-build 找不到 SakuraFilter.Api → Win32Exception 2 (No such file or directory)
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend/src/SakuraFilter.Api
      - name: chmod API binary
        # WHY: download-artifact 解压的文件默认 0644, Linux 容器内 +x 位未设置
        #   → dotnet run --no-build fork+exec 触发 Win32Exception 13 (EACCES)
        #   修复: 给 SakuraFilter.Api 主程序加可执行位
        run: chmod +x backend/src/SakuraFilter.Api/bin/Release/net8.0/SakuraFilter.Api
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      # 启动 API (frontend-contract job 专用 5148)
      - name: Run API server (background)
        id: api-server-fc
        run: |
          cd backend/src/SakuraFilter.Api
          dotnet run -c Release --no-build --urls "http://localhost:5148" > /tmp/api5148_fc.log 2>&1 &
          API_PID=$!
          A_READY=0
          for i in $(seq 1 120); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5148/api/etl/status -H "X-Admin-Token: $ADMIN_TOKEN" 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then
              echo "API 5148 (fc) ready after ${i}s"
              A_READY=1
              break
            fi
            sleep 1
          done
          if [ "$A_READY" != "1" ]; then
            echo "::error::API 5148 (fc) 120s 内未就绪"
            tail -n 30 /tmp/api5148_fc.log | sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' | while IFS= read -r line; do
              echo "::error file=/tmp/api5148_fc.log::$line"
            done
            exit 1
          fi

      # P4.2 契约测试 (vitest + zod) — 字典 schema 端点 → 8 个 zod 校验
      - name: Run P4.2 contract test (vitest)
        working-directory: frontend
        env:
          BACKEND_URL: ${{ env.BACKEND_URL }}
          ADMIN_TOKEN: ${{ env.ADMIN_TOKEN }}
        run: |
          echo "===== P4.2 字典 schema 契约测试 (vitest) ====="
          if npm run test:contract; then
            echo "[PASS] P4.2 contract test 8/8 全绿"
          else
            RC=$?
            echo "::error::P4.2 FAIL: contract test (rc=$RC)"
            exit $RC
          fi

      # P4.3 视觉烟雾 (Python 调后端 8 字典端点 + 字段完整)
      #   真正像素对比由未来 Playwright spec 跑 (本 job 不实现)
      - name: Run P4.3 visual smoke (Python)
        working-directory: spike-test
        env:
          ADMIN_TOKEN: ${{ env.ADMIN_TOKEN }}
        run: |
          echo "===== P4.3 视觉回归 Python 烟雾 (dict 端点) ====="
          if python _test_p43_visual.py; then
            echo "[PASS] P4.3 visual smoke 6/6"
          else
            RC=$?
            echo "::error::P4.3 visual smoke FAIL (rc=$RC)"
            exit $RC
          fi

      # P5.5 + P7.1: 性能埋点 + X-Admin-Token 自动轮转 E2E
      #   - P5.5: /api/perf 端点 + 前后端 perf 拦截器 + 健康探针
      #   - P7.1: token rotate CLI + DB 存储 + PG NOTIFY 多实例同步
      #   包含 13 个测试用例, 需要 build CLI (dotnet build) 才能跑 P7.1.x
      - name: Run P5.5 + P7.1 E2E (perf + token rotation)
        working-directory: spike-test
        env:
          ADMIN_TOKEN: ${{ env.ADMIN_TOKEN }}
        run: |
          echo "===== P5.5 + P7.1 E2E (perf instrumentation + token rotation) ====="
          # WHY 先 build CLI: P7.1.x 测试依赖 SakuraFilter.Cli.exe (rotate-token 命令)
          echo "[build] SakuraFilter.Cli (Release)"
          cd ../backend/src/SakuraFilter.Cli
          dotnet build -c Release --nologo
          if [ $? -ne 0 ]; then
            echo "::error::SakuraFilter.Cli build 失败"
            exit 1
          fi
          cd ../../../spike-test
          # WHY 复制 CLI 到 Api bin: E2E 测试用 BACKEND/src/SakuraFilter.Cli/bin/... 路径
          #   (与本地约定一致 — Api 与 Cli 是兄弟 project)
          if python _test_p55_p71_e2e.py; then
            echo "[PASS] P5.5+P7.1 E2E 13/13"
          else
            RC=$?
            echo "::error::P5.5+P7.1 E2E FAIL (rc=$RC)"
            exit $RC
          fi
