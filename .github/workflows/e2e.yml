# Day 9.9: CI E2E gate — master push 强制, PR fail-soft
#   WHY: 之前 .github/workflows 不存在, Day 9.6 声称设了 CI gate 但未落盘
#   设计:
#     - master push: E2E 全过才允许合并 (gate)
#     - PR: E2E 失败不阻塞 (fail-soft), 仅报告
#     - PostgreSQL service container (离线, 无外部依赖)
#     - .NET build + Python E2E (Day 9.5/9.6/9.7/9.8)
name: E2E Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOTNET_VERSION: '8.0.x'
  PYTHON_VERSION: '3.12'
  ADMIN_TOKEN: 'dev-admin-token-rotate-in-prod-MZK4R9P3X6V2N7Q1L5F0B8H3C'
  PG_PASSWORD: '784533'

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Day 9.6: PR 模式 fail-soft (不阻塞合并)
    continue-on-error: ${{ github.event_name == 'pull_request' }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 784533
          POSTGRES_DB: spike_test_v3
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        run: pip install psycopg2-binary

      - name: Build backend
        run: |
          cd backend/src/SakuraFilter.Api
          dotnet build -c Release --nologo

      # Day 10+ P0.2: EF Core Migrations baseline seed
      #   WHY: EF Core 8 + EFCore.NamingConventions 不改内置表名, 必须写到 PascalCase __EFMigrationsHistory.
      #        CI 全新 PG 无 history 表, 必须手工 seed 4 个老 migration (本地 SQL migration 已应用过, 索引名/列名
      #        与 EF Core 期望不一致, EF Core 上来就 DROP/ALTER 失败). 后续 EF Core Migrate 只跑新 migration.
      #   默认参数: spike_test_v3 / 4 个老 migration (与 spike_test/_ef_migrations_baseline.py DEFAULT_MIGRATIONS 一致).
      - name: Run EF Core Migrations baseline seed
        working-directory: spike-test
        run: python _ef_migrations_baseline.py

      - name: Run API server (background)
        run: |
          cd backend/src/SakuraFilter.Api
          dotnet run -c Release --no-build --urls "http://localhost:5148" > /tmp/api5148.log 2>&1 &
          # Day 9.12: 循环等待 5148 可达 (最多 60s)
          #   WHY: 之前固定 sleep 5 不够, dotnet 启动 + Database.Migrate + LISTEN 需 5-10s
          #        Linux CI runner 状态波动大, 偶发需 30s+
          A_READY=0
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5148/api/etl/status -H "X-Admin-Token: $ADMIN_TOKEN" 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then
              echo "API 5148 ready after ${i}s"
              A_READY=1
              break
            fi
            sleep 1
          done
          if [ "$A_READY" != "1" ]; then
            echo "=== FAIL: API 5148 60s 内未就绪 ==="
            echo "--- 5148 API 日志 (前 100 行) ---"
            head -n 100 /tmp/api5148.log || echo "无日志"
            exit 1
          fi

      - name: Run E2E Day 9.5 (cancel enum + alert filter + cursor HMAC)
        working-directory: spike-test
        run: python _test_day95.py

      - name: Run E2E Day 9.6 (radio UI + CI gate + HMAC rotation + SSE broadcast)
        working-directory: spike-test
        run: python _test_day96.py

      - name: Run E2E Day 9.7 (cross-instance SSE NOTIFY/LISTEN)
        working-directory: spike-test
        run: |
          # Day 9.7 需要双实例, CI 内启动第二个
          # Day 9.12 v7: 修复 cd 路径错误
          #   WHY: working-directory=spike-test, cd ../backend/src/SakuraFilter.Api 后
          #        cwd=checkout/backend/src/SakuraFilter.Api
          #        cd ../../spike-test 只回退 2 级到 backend/, 进 spike-test = backend/spike-test (不存在)
          #        set -e 触发 cd 失败 → step 立即退出 (0 秒失败, 无 ::error:: 注解输出)
          #        必须回退 3 级: ../../../spike-test = checkout/spike-test
          cd ../backend/src/SakuraFilter.Api
          dotnet run -c Release --no-build --urls "http://localhost:5149" > /tmp/api5149.log 2>&1 &
          cd ../../../spike-test
          # Day 9.12: 循环等待 5149 实例可达 (最多 30s)
          #   WHY: 之前固定 sleep 3s 不够, dotnet 启动 + Database.Migrate + LISTEN 需 5-8s
          #        API 可达时 EtlProgressBroadcaster 已建立 LISTEN (HostedService.StartAsync 完成)
          B_READY=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5149/api/etl/status -H "X-Admin-Token: $ADMIN_TOKEN" 2>/dev/null || echo 000)
            echo "[wait] instance B http code = $code (try $i/30)"
            if [ "$code" = "200" ]; then
              echo "Instance B ready after ${i}s"
              B_READY=1
              break
            fi
            sleep 1
          done
          if [ "$B_READY" != "1" ]; then
            echo "=== FAIL: Instance B (5149) 30s 内未就绪 ==="
            echo "--- 5149 API 日志 (前 80 行) ---"
            head -n 80 /tmp/api5149.log || echo "无日志"
            echo "--- 5148 API 进程 ---"
            ps -ef | grep -E "dotnet|SakuraFilter" | grep -v grep || echo "无 dotnet 进程"
            exit 1
          fi
          # Day 9.12: 测试失败时输出诊断信息 (LISTEN 进程数 + 双实例 API 日志)
          if ! python _test_day97.py; then
            echo "=== _test_day97.py 失败, 收集诊断信息 ==="
            echo "--- PG LISTEN etl_progress 进程数 ---"
            python -c "
          import psycopg2
          c = psycopg2.connect(host='localhost', port=5432, dbname='spike_test_v3', user='postgres', password='784533')
          cur = c.cursor()
          cur.execute(\"SELECT pid, query FROM pg_stat_activity WHERE query ILIKE '%LISTEN etl_progress%'\")
          for r in cur.fetchall():
              print(f'  pid={r[0]} query={r[1][:80]}')
          c.close()
          " || echo "查询失败"
            echo "--- 5149 API 日志 (后 50 行) ---"
            tail -n 50 /tmp/api5149.log || echo "无日志"
            exit 1
          fi

      - name: Run E2E Day 9.8 (ETL history audit + reason_code pie chart)
        working-directory: spike-test
        run: python _test_day98.py

      - name: Run E2E Day 10 (OEM Brand 字典 CRUD + 排序 + typeahead)
        working-directory: spike-test
        # Day 10: P1.3 OEM Brand 字典 — CI 空白 PG 无历史数据, Case 9 (xrefCount) 会自动 skip
        #   Case 1-8 + 10 验证表结构/CRUD/排序/typeahead, EF Core Migrate 会建 xref_oem_brand 表
        run: python _test_day10_oem_brands.py

      - name: E2E gate check (master only)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          echo "E2E gate passed — all tests green on master push"
