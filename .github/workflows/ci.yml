name: CI

# Day 9.4: 接入 vue-tsc 静态检查 + 关键目录 lint
# WHY: 上轮 AdminProductsView.vue 缺 historyFilter/historyLoading 声明
#      (template 引用 19 处 script 完全没声明) 浪费 30min 排查
#      vue-tsc --noEmit 会一次性把所有 "template 用了 script 未声明" 类 bug 抓出来
# 覆盖:
#   - frontend type check (vue-tsc)
#   - backend build check (dotnet build)
# 后续可加:
#   - playwright e2e
#   - etl regression test

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  frontend-typecheck:
    name: Frontend Type Check
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      # Day 9.4: vue-tsc --noEmit, 0 错误才通过
      # 这一个步骤就能抓出 "template 引用 script 未声明" 类 bug
      - name: Type check (vue-tsc)
        working-directory: frontend
        run: npx vue-tsc --noEmit

  backend-build:
    name: Backend Build
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: backend
        run: dotnet restore

      - name: Build
        working-directory: backend
        run: dotnet build --no-restore -c Release

  # Day 9.5: 后端 integration test 跑 E2E 套件
  #   WHY: 后端 build 只验证编译, 不会发现 "运行期 500 / cursor 越权 / cancel 落库丢失" 类问题
  #   覆盖: Day 9.4 E2E (29 用例: cancel 落库 / cursor 分页 / SSE / dry-run 50 行)
  #   数据库: 用 GitHub Actions service container 起 PostgreSQL 16
  backend-integration:
    name: Backend Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: spike_test_v3
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 784533
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Restore
        working-directory: backend
        run: dotnet restore

      - name: Build
        working-directory: backend
        run: dotnet build --no-restore -c Release

      # Day 9.11: 删除 Apply migrations 步骤
      #   WHY: Program.cs 启动时 Database.Migrate() 已自动应用 EF Core Migrations
      #        InitialCreate 迁移包含完整 schema (9 表+索引),空数据库自动创建
      #   旧 19 个 SQL 迁移保留为历史文档,Migrate 已覆盖其 schema 变更

      # Day 9.5: 跑 E2E 套件, 任意 case 失败 → exit 1 → CI 红
      # Day 9.6: E2E_REQUIRED 门禁
      #   - master 分支: 默认开 (PR merge 前必须全绿)
      #   - feature 分支: 默认关 (跑过即记录, 避免数据集未 ready 永久红)
      #   - 工作流 dispatch 或 E2E_REQUIRED=true: 强制开
      # WHY 区分: master 是基线, 必须严格; feature 还在迭代, 数据集可能未 seed
      - name: Run E2E regression
        working-directory: spike-test
        env:
          E2E_REQUIRED: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && 'true' || (github.event_name == 'workflow_dispatch' && 'true' || 'false') }}
          ADMIN_TOKEN: 'dev-admin-token-rotate-in-prod-MZK4R9P3X6V2N7Q1L5F0B8H3C'
        run: |
          # 启动后端 (后台, 等几秒健康检查)
          cd ../backend/src/SakuraFilter.Api
          nohup dotnet run --no-build -c Release --urls http://localhost:5148 > /tmp/api.log 2>&1 &
          API_PID=$!
          echo "API PID: $API_PID"
          # Day 9.12: 循环等待 5148 可达 (最多 60s) + 失败诊断
          #   WHY: 之前 30s 不够 + 无失败检查, 5148 没起来直接跑测试会失败
          A_READY=0
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5148/api/etl/status -H "X-Admin-Token: $ADMIN_TOKEN" 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then
              echo "API 5148 ready after ${i}s"
              A_READY=1
              break
            fi
            sleep 1
          done
          if [ "$A_READY" != "1" ]; then
            echo "=== FAIL: API 5148 60s 内未就绪 ==="
            echo "--- 5148 API 日志 (前 100 行) ---"
            head -n 100 /tmp/api.log || echo "无日志"
            exit 1
          fi
          # 跑 E2E 套件
          # Day 9.12 v7: 修复 cd 路径错误 (同 e2e.yml Day 9.7 step)
          #   WHY: cwd 在 checkout/backend/src/SakuraFilter.Api
          #        cd ../../spike-test = backend/spike-test (不存在) → set -e 退出
          #        正确路径: ../../../spike-test = checkout/spike-test
          cd ../../../spike-test
          ALL_PASS=0
          for suite in _test_day95.py _test_day94.py; do
            if [ -f "$suite" ]; then
              echo "================ Running $suite ================"
              if python "$suite"; then
                echo "[PASS] $suite"
              else
                RC=$?
                echo "[FAIL] $suite (rc=$RC)"
                ALL_PASS=1
                if [ "$E2E_REQUIRED" = "true" ]; then
                  echo "E2E_REQUIRED=true → 立即终止"
                  exit $RC
                fi
              fi
            fi
          done
          if [ "$ALL_PASS" != "0" ] && [ "$E2E_REQUIRED" != "true" ]; then
            echo "E2E 有失败 (但 E2E_REQUIRED=false, 记录日志但不 fail job)"
          fi
          echo "E2E finished. E2E_REQUIRED=$E2E_REQUIRED"
