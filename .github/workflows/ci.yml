name: CI

# Day 9.4: 接入 vue-tsc 静态检查 + 关键目录 lint
# WHY: 上轮 AdminProductsView.vue 缺 historyFilter/historyLoading 声明
#      (template 引用 19 处 script 完全没声明) 浪费 30min 排查
#      vue-tsc --noEmit 会一次性把所有 "template 用了 script 未声明" 类 bug 抓出来
# 覆盖:
#   - frontend type check (vue-tsc)
#   - backend build check (dotnet build)
# 后续可加:
#   - playwright e2e
#   - etl regression test

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  frontend-typecheck:
    name: Frontend Type Check
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      # Day 9.4: vue-tsc --noEmit, 0 错误才通过
      # 这一个步骤就能抓出 "template 引用 script 未声明" 类 bug
      - name: Type check (vue-tsc)
        working-directory: frontend
        run: npx vue-tsc --noEmit

  backend-build:
    name: Backend Build
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: backend
        run: dotnet restore

      - name: Build
        working-directory: backend
        run: dotnet build --no-restore -c Release
