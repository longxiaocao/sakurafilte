# P1-2: Nginx 配置 (反代 + 静态托管)
#   - SPA 路由: 所有非 API 路径 fallback 到 index.html
#   - API 反代: /api/* → api:8080 容器 (docker-compose 网络)
#   - 静态资源: 1 年缓存 + immutable
#   - 安全头: HSTS, X-Frame-Options, CSP 等
#   - Gzip: 文本类资源压缩

upstream sakura_api {
    server api:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP 允许 Element Plus CDN (如使用) + 自身
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http: https:;" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # 客户端最大请求体 (与 API Kestrel 限制对齐)
    client_max_body_size 10M;

    # API 反代
    location /api/ {
        proxy_pass http://sakura_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SSE 长连接 (ETL 实时进度)
    location /api/etl/progress {
        proxy_pass http://sakura_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s; # 24h
    }

    # 静态资源 (含 hash 命名的 Vite 构建产物, 1 年缓存)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # === SEO 路由反代到 ASP.NET backend (须在 SPA fallback 之前) ===

    # 商品详情页 (SEO 优化路由, 由 ASP.NET SSR/预渲染处理)
    location ~ ^/products/ {
        proxy_pass http://sakura_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 旧商品 URL 301 重定向 (由 backend 处理到 /products/ 的重定向逻辑)
    location ~ ^/product/ {
        proxy_pass http://sakura_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SEO sitemap (sitemap.xml 及 sitemaps/ 目录)
    location ~ ^/(sitemap\.xml|sitemaps/) {
        proxy_pass http://sakura_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # robots.txt (精确匹配, 优先级高于正则)
    location = /robots.txt {
        proxy_pass http://sakura_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SPA fallback (所有非 API/资源路径)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # 健康检查
    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
