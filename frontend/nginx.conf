# SakuraFilter nginx 配置
#   - SPA 路由回退 (Vue Router history 模式)
#   - /api/ 反向代理到后端容器
#   - 静态资源长缓存

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由回退: 所有非文件请求 → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端容器 (docker-compose 服务名: backend)
    location /api/ {
        proxy_pass http://backend:5148;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Swagger/OpenAPI 文档 (可选, 生产环境可注释掉)
    location /scalar {
        proxy_pass http://backend:5148;
        proxy_set_header Host $host;
    }
    location /swagger {
        proxy_pass http://backend:5148;
        proxy_set_header Host $host;
    }

    # 静态资源长缓存 (js/css 带 hash, 可 1 年缓存)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;
}
